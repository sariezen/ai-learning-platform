version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: learning_platform_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ai_learning_platform
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: learning_platform_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: learning_platform_frontend
    restart: unless-stopped
    ports:
      - '4200:80'
    depends_on:
      - backend

volumes:
  mysql_data:
